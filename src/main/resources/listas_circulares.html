<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Listas Circulares — Estructuras de Datos y Algoritmos 1</title>
<style>
  :root{
    --navy:#0c1a33;
    --navy-2:#122447;
    --accent:#1d3f7a;
    --accent-2:#3f66a6;
    --footer-black:#000000;
    --bg:#eef1f6;
    --panel:#ffffff;
    --line:#dde3ee;
    --text:#1c2536;
    --muted:#6b7690;
    --code-bg:#0f1b33;
    --code-text:#d7e2ff;
    --good:#1f9d63;
    --warn:#c0392b;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  .app{
    display:flex;
    flex:1;
    min-height:0;
  }

  /* SIDEBAR */
  .sidebar{
    width:250px;
    background:var(--navy);
    color:#c9d3ec;
    padding:22px 18px;
    overflow-y:auto;
    flex-shrink:0;
  }
  .sidebar h1{
    color:#fff;
    font-size:20px;
    margin:0 0 6px 0;
    letter-spacing:.3px;
  }
  .sidebar hr{
    border:none;
    border-top:1px solid rgba(255,255,255,.18);
    margin:10px 0 16px 0;
  }
  .tema-block{margin-bottom:18px;}
  .tema-title{
    font-weight:600;
    font-size:14px;
    color:#fff;
    margin:0 0 6px 2px;
  }
  .nav-item{
    display:block;
    padding:8px 10px;
    margin:2px 0;
    border-radius:6px;
    font-size:13.5px;
    color:#c9d3ec;
    cursor:pointer;
    text-decoration:none;
    transition:background .15s;
  }
  .nav-item:hover{background:rgba(255,255,255,.08);}
  .nav-item.active{background:var(--accent);color:#fff;font-weight:600;}
  .nav-item.credit-link{color:#93a2c7;font-style:italic;}
  .tema-block + .tema-block{border-top:1px solid rgba(255,255,255,.14);padding-top:14px;}

  /* MAIN */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .topbar{
    background:var(--navy-2);
    color:#fff;
    padding:16px 26px;
    font-size:19px;
    font-weight:600;
    letter-spacing:.3px;
    flex-shrink:0;
  }
  .topbar span{
    display:block;
    font-size:12px;
    font-weight:400;
    color:#a9b7dd;
    margin-top:2px;
    letter-spacing:.2px;
  }
  .content{
    flex:1;
    display:flex;
    gap:16px;
    padding:18px;
    min-height:0;
  }

  /* VISUAL PANEL */
  .visual-panel{
    flex:1.4;
    background:var(--panel);
    border-radius:10px;
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-width:0;
    overflow:hidden;
  }
  .visual-header{
    padding:12px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  .visual-header h2{margin:0;font-size:15px;color:var(--navy);}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .controls input[type=text]{
    border:1px solid var(--line);
    border-radius:6px;
    padding:7px 10px;
    font-size:13px;
    width:130px;
  }
  .btn{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:8px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, opacity .15s;
  }
  .btn:hover{background:#2559c9;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn.secondary{background:#eef1f6;color:var(--navy);border:1px solid var(--line);}
  .btn.secondary:hover{background:#e2e7f2;}

  .svg-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    min-height:0;
    padding:6px;
    overflow-x:auto;
    overflow-y:hidden;
  }
  .svg-wrap svg{height:100%;max-height:260px;flex-shrink:0;display:block;margin:0 auto;}

  .list-strip{
    padding:8px 18px;
    font-size:12.5px;
    color:var(--muted);
    border-top:1px solid var(--line);
    white-space:nowrap;
    overflow-x:auto;
  }
  .list-strip b{color:var(--navy);}

  .log-panel{
    border-top:1px solid var(--line);
    height:92px;
    padding:8px 18px;
    overflow-y:auto;
    font-size:12.5px;
    color:var(--muted);
    background:#f7f9fc;
    flex-shrink:0;
  }
  .log-panel div{padding:2px 0;}
  .log-panel .now{color:var(--navy);font-weight:600;}

  .code-panel{
    flex:1;
    background:var(--panel);
    border-radius:10px;
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-width:0;
    overflow:hidden;
  }
  .tabs{
    display:flex;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:12px 0;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    background:#f7f9fc;
  }
  .tab.active{background:var(--panel);color:var(--navy);border-bottom:2px solid var(--accent);}
  .code-body{
    flex:1;
    overflow:auto;
    background:var(--code-bg);
  }
  .code-body pre{
    margin:0;
    padding:16px 18px;
    font-family:"Consolas","Menlo",monospace;
    font-size:12.8px;
    line-height:1.55;
    color:var(--code-text);
  }
  .pline{display:block;padding:1px 8px;border-radius:4px;white-space:pre;}
  .pline.hl{background:rgba(91,141,255,.28);box-shadow:inset 3px 0 0 var(--accent-2);}

  .credits-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .credits-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    max-width:560px;
    width:100%;
    padding:40px 44px;
    text-align:center;
  }
  .credit-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-bottom:6px;
  }
  .credit-header .escudo-img{height:60px;width:auto;}
  .credit-header .fis-img{height:50px;width:auto;}
  .credit-header .credit-title{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:.4px;}
  .ludolab-block{
    margin-top:26px;
    padding-top:20px;
    border-top:1px solid var(--line);
  }
  .ludolab-block img{height:52px;width:auto;margin-bottom:10px;}
  .ludolab-block .proj-line{font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.2px;}
  .credits-card h2{color:var(--navy);font-size:22px;margin:6px 0 26px 0;letter-spacing:.3px;}
  .credits-card .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    margin:18px 0 8px 0;
  }
  .credits-card .names{font-size:15px;color:var(--text);line-height:1.9;}
  .credits-card .prof{font-size:14px;color:var(--navy);font-weight:600;margin-top:22px;}
  .credits-card .proj{
    margin-top:28px;
    padding-top:18px;
    border-top:1px solid var(--line);
    font-size:12.5px;
    color:var(--muted);
  }

  /* BOTTOM BAR */
  .footer{
    background:var(--footer-black);
    color:#c9d3ec;
    text-align:center;
    padding:9px;
    font-size:12px;
    letter-spacing:1px;
    flex-shrink:0;
  }

  .ptr-badge{
    font-family:"Consolas",monospace;
    font-weight:700;
    font-size:11px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar" id="topbar">Listas Circulares<span>Estructuras de Datos y Algoritmos I</span></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="footer">ESCUELA POLITÉCNICA NACIONAL</div>

const NODE_W=90, NODE_H=54, GAP=50, MARGIN=55, TOPCURVE=68, ROW_Y=140, SVG_H=250;

function xOf(i){ return MARGIN + i*(NODE_W+GAP); }

function drawGraph(work, pointers, opts){
  opts = opts || {};
  const wrap = document.getElementById('svgWrap');
  if(!wrap) return;
  const n = work.length;

  if(n===0){
    wrap.innerHTML = `<svg viewBox="0 0 460 ${SVG_H}" xmlns="http://www.w3.org/2000/svg" width="460" height="${SVG_H}">
      <text x="230" y="${ROW_Y}" text-anchor="middle" fill="#9aa6c2" font-size="15">Lista circular vacía (p = null)</text>
    </svg>`;
    return;
  }

  let width = Math.max(460, MARGIN*2 + n*NODE_W + (n-1)*GAP);
  const svgH = opts.ghost ? SVG_H + 60 : SVG_H;

  let svg = `<svg viewBox="0 0 ${width} ${svgH}" xmlns="http://www.w3.org/2000/svg" width="${width}" height="${svgH}">
    <defs>
      <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L7,3 L0,6 Z" fill="#5b8dff"/>
      </marker>
      <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L7,3 L0,6 Z" fill="#9aa6c2"/>
      </marker>
    </defs>`;

  /* curva de retorno (circularidad): del último nodo de vuelta al primero */
  if(n===1){
    const x = xOf(0), top = ROW_Y - NODE_H/2;
    svg += `<path d="M ${x+NODE_W*0.28},${top} C ${x-6},${top-46} ${x+NODE_W+6},${top-46} ${x+NODE_W*0.72},${top}"
      fill="none" stroke="#9aa6c2" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowGray)"/>`;
  } else {
    const lastX = xOf(n-1) + NODE_W*0.78;
    const firstX = xOf(0) + NODE_W*0.22;
    const top = ROW_Y - NODE_H/2;
    const curveY = top - TOPCURVE;
    svg += `<path d="M ${lastX},${top} C ${lastX},${curveY} ${firstX},${curveY} ${firstX},${top}"
      fill="none" stroke="#9aa6c2" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowGray)"/>`;
  }

  /* flechas rectas entre nodos consecutivos */
  for(let i=0;i<n-1;i++){
    const x1 = xOf(i) + NODE_W;
    const x2 = xOf(i+1);
    svg += `<path d="M ${x1-1},${ROW_Y} L ${x2+2},${ROW_Y}" stroke="#5b8dff" stroke-width="2" marker-end="url(#arrow)"/>`;
  }

  /* cajas de los nodos */
  for(let i=0;i<n;i++){
    svg += nodeBox(xOf(i), ROW_Y, work[i].val, i, pointers, false);
  }

  if(opts.ghost){
    const gx = width/2 - NODE_W/2;
    const gy = ROW_Y + 110;
    svg += nodeBox(gx, gy, opts.ghost, -1, {}, true);
    svg += `<text x="${gx+NODE_W/2}" y="${gy+NODE_H/2+34}" text-anchor="middle" font-size="10.5" fill="#9aa6c2">nuevo nodo (aún no enlazado)</text>`;
  }

  svg += `</svg>`;
  wrap.innerHTML = svg;
}

function nodeBox(x, y, val, idx, pointers, dashed){
  const top = y - NODE_H/2;
  const dataW = NODE_W*0.6;
  const dashAttr = dashed ? 'stroke-dasharray="4,3"' : '';
  let s = `<g>`;
  s += `<rect x="${x}" y="${top}" width="${NODE_W}" height="${NODE_H}" fill="#ffffff" stroke="#152a4e" stroke-width="2" ${dashAttr}/>`;
  s += `<line x1="${x+dataW}" y1="${top}" x2="${x+dataW}" y2="${top+NODE_H}" stroke="#152a4e" stroke-width="2" ${dashAttr}/>`;
  s += `<text x="${x+dataW/2}" y="${y+5}" text-anchor="middle" font-size="14" font-weight="600" fill="#152a4e" font-family="Consolas,monospace">${escapeHtml(String(val))}</text>`;
  s += `<circle cx="${x+dataW+(NODE_W-dataW)/2}" cy="${y}" r="3" fill="${dashed?'#9aa6c2':'#152a4e'}"/>`;
  const tags = [];
  if(pointers && pointers.P===idx) tags.push({t:'P',c:'#1f9d63'});
  if(pointers && pointers.Q===idx) tags.push({t:'Q',c:'#c0392b'});
  if(pointers && pointers.T===idx) tags.push({t:'T',c:'#b8860b'});
  tags.forEach((tag,k)=>{
    const yOff = top - 10 - (k*16);
    s += `<text x="${x+NODE_W/2}" y="${yOff}" text-anchor="middle" font-size="12" font-weight="800" fill="${tag.c}" class="ptr-badge">${tag.t}</text>`;
  });
  s += `</g>`;
  return s;
}

function sleep(ms){ return new Promise(res=>setTimeout(res,ms)); }
const SPEED = 780;

function lockUI(v){
  animating = v;
  document.querySelectorAll('.btn').forEach(b=>b.disabled=v);
}

async function step(pseudoLine, pointers, msg, work, opts){
  renderPseudo(pseudoLine);
  drawGraph(work!==undefined?work:nodes, pointers||{}, opts||{});
  if(msg) log(msg);
  await sleep(SPEED);
}

function runOperation(){
  if(animating) return;
  const input = document.getElementById('valInput');
  const val = input ? input.value.trim() : '';
  const needsValue = ['creacion-inicio','creacion-final','insercion-inicio','insercion-final','busqueda'].includes(currentView);
  if(needsValue && !val){ alert('Por favor ingrese un valor.'); return; }
  if(input) input.value='';

  switch(currentView){
    case 'creacion-inicio': animCreacionInicio(val); break;
    case 'creacion-final': animCreacionFinal(val); break;
    case 'insercion-inicio': animInsercionInicio(val); break;
    case 'insercion-final': animInsercionFinal(val); break;
    case 'eliminacion-inicio': animEliminacionInicio(); break;
    case 'eliminacion-final': animEliminacionFinal(); break;
    case 'busqueda': animBusqueda(val); break;
    case 'recorrido': animRecorrido(); break;
  }
}

/*Creación Inicio*/
async function animCreacionInicio(val){
  lockUI(true);
  clearLog();
  await step(1, {}, `¿p == null? ${nodes.length===0}`);
  if(nodes.length===0){
    await step(2, {}, `Se lee el valor "${val}"`);
    await step(3, {}, `Se crea el nuevo nodo`, [], {ghost:val});
    const nuevo = {id:idSeq++, val:val};
    nodes = [nuevo];
    await step(4, {P:0}, `El nodo apunta a sí mismo (Q^.L = Q)`);
    await step(5, {P:0}, `P = Q → la lista queda con un solo nodo`);
  } else {
    await step(6, {}, `La lista ya existe → rama Sino`);
    await step(7, {}, `Se ejecuta insertarInicioListaCircular()`);
    await subInsertarInicio(val);
  }
  renderListStrip();
  renderPseudo(-1);  
  lockUI(false);
}

/*Creación Final*/
async function animCreacionFinal(val){
  lockUI(true);
  clearLog();
  await step(1, {}, `¿p == null? ${nodes.length===0}`);
  if(nodes.length===0){
    await step(2, {}, `Se lee el valor "${val}"`);
    await step(3, {}, `Se crea el nuevo nodo`, [], {ghost:val});
    const nuevo = {id:idSeq++, val:val};
    nodes = [nuevo];
    await step(4, {P:0}, `El nodo apunta a sí mismo (T^.L = T)`);
    await step(5, {P:0}, `P = T → la lista queda con un solo nodo`);
  } else {
    await step(6, {}, `La lista ya existe → rama Sino`);
    await step(7, {}, `Se ejecuta insertarFinalListaCircular()`);
    await subInsertarFinal(val);
  }
  renderListStrip();
  renderPseudo(-1);
  lockUI(false);
}

/*Inserción Inicio*/
async function animInsercionInicio(val){
  lockUI(true);
  clearLog();
  if(nodes.length===0){
    await step(1, {}, `P != null? No`);
    await step(12, {}, `La lista está vacía, use creación primero`);
    lockUI(false); return;
  }
  await step(1, {}, `¿p != null? Sí`);
  await subInsertarInicio(val);
  renderListStrip();
  renderPseudo(-1);
  lockUI(false);
}

async function subInsertarInicio(val){
  let t = 0;
  await step(2, {P:0,T:0}, `T = P`);
  while(t !== nodes.length-1){
    await step(3, {P:0,T:t}, `¿T.Liga != P? Sí → seguir avanzando`);
    t++;
    await step(4, {P:0,T:t}, `T = T.Liga`);
  }
  await step(3, {P:0,T:t}, `T.Liga != P? No → T es el último nodo`);
  await step(6, {P:0,T:t}, `Se lee el valor "${val}"`);
  await step(7, {P:0,T:t}, `Se crea el nuevo nodo Q`, nodes, {ghost:val});
  await step(8, {P:0,T:t}, `Q.Liga = P (el nuevo nodo apunta al inicio actual)`, nodes, {ghost:val});
  const nuevo = {id:idSeq++, val:val};
  nodes = [nuevo, ...nodes];
  await step(9, {P:1,T:0}, `T.Liga = Q (el último nodo ahora apunta al nuevo nodo)`);
  await step(10, {P:0}, `P = Q → el nuevo nodo es ahora el inicio de la lista`);
}

/*Inserción Final*/
async function animInsercionFinal(val){
  lockUI(true);
  clearLog();
  if(nodes.length===0){
    await step(1, {}, `P != null? No`);
    await step(11, {}, `La lista está vacía, use creación primero`);
    lockUI(false); return;
  }
  await step(1, {}, `P != null? Sí`);
  await subInsertarFinal(val);
  renderListStrip();
  renderPseudo(-1);
  lockUI(false);
}

async function subInsertarFinal(val){
  let q = 0;
  await step(2, {P:0,Q:0}, `Q = P`);
  while(q !== nodes.length-1){
    await step(3, {P:0,Q:q}, `¿Q.Liga != P? Sí → seguir avanzando`);
    q++;
    await step(4, {P:0,Q:q}, `Q = Q.Liga`);
  }
  await step(3, {P:0,Q:q}, `¿Q.Liga != P? No → Q es el último nodo`);
  await step(6, {P:0,Q:q}, `Se lee el valor "${val}"`);
  await step(7, {P:0,Q:q}, `Se crea el nuevo nodo T`, nodes, {ghost:val});
  await step(8, {P:0,Q:q}, `T.Liga = P (el nuevo nodo cierra el círculo hacia el inicio)`, nodes, {ghost:val});
  const nuevo = {id:idSeq++, val:val};
  nodes = [...nodes, nuevo];
  await step(9, {P:0,Q:q}, `Q.Liga = T (el antiguo último nodo ahora apunta al nuevo nodo)`);
}

/*Eliminación Inicio*/
async function animEliminacionInicio(){
  lockUI(true);
  clearLog();
  if(nodes.length===0){
    await step(1, {}, `P == null? Sí`);
    await step(2, {}, `La lista está vacía.`);
    lockUI(false); return;
  }
  await step(1, {}, `P == null? No`);
  await step(4, {P:0}, `Q = P (el nodo a eliminar)`);
  if(nodes.length===1){
    await step(5, {P:0,Q:0}, `¿Q.Liga == P? Sí → solo hay un nodo`);
    nodes = [];
    await step(6, {}, `P = null → la lista queda vacía`);
  } else {
    await step(7, {P:0,Q:0}, `Q.Liga == P? No → rama Sino`);
    let q = 0;
    while(q !== nodes.length-1){
      await step(8, {P:0,Q:q}, `¿Q.Liga != P? Sí → seguir avanzando`);
      q++;
      await step(9, {P:0,Q:q}, `Q = Q.Liga`);
    }
    await step(8, {P:0,Q:q}, `Q.Liga != P? No → Q es el último nodo`);
    await step(11, {P:0,Q:q}, `P = P.Liga (el segundo nodo será el nuevo inicio)`);
    nodes = nodes.slice(1);
    await step(12, {P:0,Q:q-1}, `Q.Liga = P → el último nodo cierra el círculo con el nuevo inicio`);
  }
  renderListStrip();
  renderPseudo(-1);
  lockUI(false);
}

/*Eliminación Final */
async function animEliminacionFinal(){
  lockUI(true);
  clearLog();
  if(nodes.length===0){
    await step(1, {}, `P == null? Sí`);
    await step(2, {}, `La lista está vacía.`);
    lockUI(false); return;
  }
  await step(1, {}, `P == null? No`);
  if(nodes.length===1){
    await step(4, {P:0}, `¿P.Liga == P? Sí → solo hay un nodo`);
    nodes = [];
    await step(5, {}, `P = null → la lista queda vacía`);
  } else {
    await step(6, {P:0}, `¿P.Liga == P? No → rama Sino`);
    let q = 0;
    await step(7, {P:0,Q:0}, `Q = P (el nodo a eliminar)`);
    while(q !== nodes.length-2){
      await step(8, {P:0,Q:q}, `¿Q.Liga.Liga != P? Sí → seguir avanzando`);
      q++;
      await step(9, {P:0,Q:q}, `Q = Q.Liga`);
    }
    await step(8, {P:0,Q:q}, `¿Q.Liga.Liga != P? No → Q es el penúltimo nodo`);
    await step(11, {P:0,Q:q,T:q+1}, `T = Q.Liga (el último nodo, a eliminar)`);
    nodes = nodes.slice(0,-1);
    await step(12, {P:0,Q:q}, `Q.Liga = P → el penúltimo nodo cierra el círculo con el inicio`);
  }
  renderListStrip();
  renderPseudo(-1);
  lockUI(false);
}

/*Búsqueda*/
async function animBusqueda(val){
  lockUI(true);
  clearLog();
  await step(1, {}, `encontrado = falso`);
  await step(2, {}, `¿P != null? ${nodes.length>0}`);
  if(nodes.length===0){
    await step(17, {}, `La lista está vacía.`);
    lockUI(false); return;
  }
  let q = 0;
  await step(3, {P:0,Q:0}, `Q = P`);
  let found = false;
  for(let count=0; count<nodes.length; count++){
    await step(5, {P:0,Q:q}, `¿Q.info == "${val}"? valor actual = "${nodes[q].val}"`);
    if(String(nodes[q].val) === val){
      found = true;
      await step(6, {P:0,Q:q}, `encontrado = verdadero`);
      break;
    } else {
      q = (q+1)%nodes.length;
      await step(8, {P:0,Q:q}, `Q = Q.Liga`);
    }
  }
  if(found){
    await step(12, {P:0,Q:q}, `Dato encontrado en la lista.`);
  } else {
    await step(14, {P:0}, `Dato no encontrado en la lista.`);
  }
  renderPseudo(-1);
  lockUI(false);
}

/* Recorrido */
async function animRecorrido(){
  lockUI(true);
  clearLog();
  await step(1, {}, `¿P != null? ${nodes.length>0}`);
  if(nodes.length===0){
    await step(8, {}, `La lista está vacía.`);
    lockUI(false); return;
  }
  let q = 0;
  await step(2, {P:0,Q:0}, `Q = P`);
  const orden = [];
  do{
    orden.push(nodes[q].val);
    await step(4, {P:0,Q:q}, `imprimir(Q.info) → "${nodes[q].val}"`);
    q = (q+1)%nodes.length;
    await step(5, {P:0,Q:q}, `Q = Q.Liga`);
  } while(q !== 0);
  await step(6, {P:0,Q:0}, `Q == P → recorrido completo: [${orden.join(', ')}]`);
  renderPseudo(-1);
  lockUI(false);
}
